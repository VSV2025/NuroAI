services:
  - type: web
    name: nuroai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements-free.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: nuroai
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        value: nuroai-secret-key-production-2026
